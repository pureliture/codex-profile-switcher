<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
  <title id="title">Safe profile switch flow</title>
  <desc id="desc">Safety flow showing baseline capture, target validation, active auth backup, atomic auth replacement, shared-state verification before restart, graceful restart, and rollback.</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#2563EB"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#DC2626"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#16A34A"/>
    </marker>
    <style>
      .bg { fill: #F8FAFC; }
      .title-text { fill: #0F172A; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 38px; font-weight: 800; }
      .subtitle { fill: #475569; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; font-weight: 650; }
      .node { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 1.7; }
      .node-important { fill: #EFF6FF; stroke: #2563EB; stroke-width: 3; }
      .node-success { fill: #F0FDF4; stroke: #16A34A; stroke-width: 2; }
      .rollback { fill: #FEF2F2; stroke: #DC2626; stroke-width: 2; }
      .label { fill: #0F172A; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; font-weight: 800; }
      .small { fill: #475569; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; font-weight: 700; }
      .tiny { fill: #64748B; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 700; }
      .redtiny { fill: #B91C1C; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 800; }
      .arrow-blue { stroke: #2563EB; stroke-width: 3; fill: none; marker-end: url(#arrow-blue); }
      .arrow-green { stroke: #16A34A; stroke-width: 3; fill: none; marker-end: url(#arrow-green); }
      .arrow-red { stroke: #DC2626; stroke-width: 2.4; fill: none; marker-end: url(#arrow-red); }
      .dash-red { stroke: #DC2626; stroke-width: 1.8; stroke-dasharray: 6 6; fill: none; marker-end: url(#arrow-red); }
    </style>
  </defs>

  <rect class="bg" width="1400" height="620"/>
  <text class="title-text" x="56" y="58">Safe profile switch</text>
  <text class="subtitle" x="58" y="86">Only ~/.codex/auth.json is replaced; shared Codex state is checked before restart.</text>

  <rect class="node" x="58" y="154" width="178" height="96" rx="16"/>
  <text class="label" x="94" y="190">Capture baseline</text>
  <text class="small" x="94" y="216">shared-state</text>
  <text class="small" x="94" y="236">fingerprint</text>

  <rect class="node" x="276" y="154" width="178" height="96" rx="16"/>
  <text class="label" x="315" y="190">Validate target</text>
  <text class="small" x="318" y="216">profile snapshot</text>
  <text class="small" x="318" y="236">must be safe</text>

  <rect class="node" x="494" y="154" width="178" height="96" rx="16"/>
  <text class="label" x="532" y="190">Backup active</text>
  <text class="small" x="530" y="216">backup</text>
  <text class="small" x="530" y="236">~/.codex/auth.json</text>

  <rect class="node-important" x="712" y="140" width="210" height="124" rx="18"/>
  <text class="label" x="760" y="184">Atomic replace</text>
  <text class="small" x="756" y="214">replace only</text>
  <text class="small" x="756" y="236">~/.codex/auth.json</text>
  <text class="tiny" x="756" y="256">scope limited to auth.json</text>

  <rect class="node" x="964" y="154" width="178" height="96" rx="16"/>
  <text class="label" x="999" y="190">Verify state</text>
  <text class="small" x="1007" y="216">before restart</text>
  <text class="small" x="1007" y="236">fail closed</text>

  <rect class="node-success" x="1182" y="154" width="178" height="96" rx="16"/>
  <text class="label" x="1218" y="190">Graceful restart</text>
  <text class="small" x="1233" y="216">restart Codex</text>
  <text class="small" x="1233" y="236">after verify</text>

  <path class="arrow-blue" d="M236 202H273"/>
  <path class="arrow-blue" d="M454 202H491"/>
  <path class="arrow-blue" d="M672 202H709"/>
  <path class="arrow-blue" d="M922 202H961"/>
  <path class="arrow-green" d="M1142 202H1179"/>

  <rect class="rollback" x="260" y="366" width="880" height="84" rx="18"/>
  <text class="label" x="538" y="402">rollback: restore backup auth.json</text>
  <text class="small" x="506" y="428">before restart when validation, replace, or post-check fails</text>

  <path class="dash-red" d="M365 250V362"/>
  <text class="redtiny" x="300" y="322">validation failed</text>

  <path class="dash-red" d="M817 264V362"/>
  <text class="redtiny" x="762" y="322">replace failed</text>

  <path class="dash-red" d="M1053 250V362"/>
  <text class="redtiny" x="986" y="322">post-check failed</text>

  <path class="arrow-red" d="M590 450C440 494 255 452 147 255"/>
  <text class="redtiny" x="300" y="505">restore previous active auth</text>

  <path class="arrow-green" d="M1140 408C1230 380 1271 312 1271 253"/>
  <text class="tiny" x="1158" y="368">verified path only</text>
</svg>
