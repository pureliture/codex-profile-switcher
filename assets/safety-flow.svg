<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">Safe auth switch flow</title>
  <desc id="desc">Switch flow with baseline capture, snapshot validation, backup, atomic replace, shared-state verification, restart, and rollback path.</desc>
  <defs>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#142033" stroke-width="1"/>
    </pattern>
    <marker id="ok" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L12 6L0 12L3.5 6Z" fill="#22C55E"/>
    </marker>
    <marker id="bad" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L12 6L0 12L3.5 6Z" fill="#EF4444"/>
    </marker>
    <style>
      .bg { fill:#070B14; }
      .title { fill:#F8FAFC; font-family:sans-serif; font-size:33px; font-weight:800; }
      .sub { fill:#7386A2; font-family:sans-serif; font-size:14px; font-weight:600; }
      .node { fill:#101A2B; stroke:#26364F; stroke-width:1.5; }
      .hot { fill:#0B1B33; stroke:#3B82F6; stroke-width:2.2; }
      .pass { fill:#0B241C; stroke:#22C55E; stroke-width:2; }
      .fail { fill:#2A1116; stroke:#EF4444; stroke-width:2; }
      .label { fill:#E2E8F0; font-family:sans-serif; font-size:15px; font-weight:800; }
      .small { fill:#94A3B8; font-family:sans-serif; font-size:11.5px; font-weight:600; }
      .red { fill:#FCA5A5; font-family:monospace; font-size:11px; font-weight:800; }
      .arrow { stroke:#22C55E; stroke-width:2.5; fill:none; marker-end:url(#ok); }
      .rollback { stroke:#EF4444; stroke-width:2; stroke-dasharray:7 7; fill:none; marker-end:url(#bad); }
    </style>
  </defs>

  <rect class="bg" width="1280" height="620"/>
  <rect width="1280" height="620" fill="url(#grid)" opacity="0.68"/>
  <rect x="0" y="0" width="1280" height="4" fill="#22C55E"/>
  <text class="title" x="56" y="58">안전한 switch 흐름</text>
  <text class="sub" x="58" y="84">Codex restart는 shared-state 검증을 통과한 뒤에만 실행됩니다.</text>

  <g transform="translate(54 154)">
    <rect class="node" x="0" y="0" width="154" height="92" rx="15"/>
    <text class="label" x="28" y="36">Baseline</text>
    <text class="small" x="28" y="60">shared state hash</text>

    <rect class="node" x="190" y="0" width="154" height="92" rx="15"/>
    <text class="label" x="218" y="36">Validate</text>
    <text class="small" x="218" y="60">safe auth snapshot</text>

    <rect class="node" x="380" y="0" width="154" height="92" rx="15"/>
    <text class="label" x="414" y="36">Backup</text>
    <text class="small" x="407" y="60">current auth.json</text>

    <rect class="hot" x="570" y="-14" width="184" height="120" rx="17"/>
    <text class="label" x="612" y="34">Atomic replace</text>
    <text class="small" x="608" y="60">only ~/.codex/auth.json</text>
    <text class="small" x="608" y="82">no shared-state write</text>

    <rect class="node" x="790" y="0" width="154" height="92" rx="15"/>
    <text class="label" x="830" y="36">Verify</text>
    <text class="small" x="822" y="60">before restart</text>

    <rect class="pass" x="980" y="0" width="154" height="92" rx="15"/>
    <text class="label" x="1018" y="36">Restart</text>
    <text class="small" x="1014" y="60">Codex Desktop</text>

    <path class="arrow" d="M154 46H187"/>
    <path class="arrow" d="M344 46H377"/>
    <path class="arrow" d="M534 46H567"/>
    <path class="arrow" d="M754 46H787"/>
    <path class="arrow" d="M944 46H977"/>

    <rect class="fail" x="238" y="214" width="658" height="78" rx="18"/>
    <text class="label" x="452" y="248">Rollback before restart</text>
    <text class="small" x="386" y="272">validation, replace, or post-check failure restores previous active auth</text>

    <path class="rollback" d="M267 92V210"/>
    <text class="red" x="214" y="168">bad profile</text>
    <path class="rollback" d="M662 106V210"/>
    <text class="red" x="606" y="168">replace fail</text>
    <path class="rollback" d="M867 92V210"/>
    <text class="red" x="810" y="168">state drift</text>
  </g>

  <rect class="node" x="54" y="510" width="1172" height="52" rx="14"/>
  <text class="small" x="80" y="542">불변식: profile switch는 계정 auth만 바꾼다. config, sessions, history, MCP, skills, plugins는 같은 workspace를 계속 공유한다.</text>
</svg>
