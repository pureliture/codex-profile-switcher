<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Codex Profile Switcher architecture</title>
  <desc id="desc">Dark architecture diagram showing isolated login, profile snapshots, auth-only switch, and shared-state guard.</desc>
  <defs>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#142033" stroke-width="1"/>
    </pattern>
    <marker id="flow" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L12 6L0 12L3.5 6Z" fill="#2DD4BF"/>
    </marker>
    <style>
      .bg { fill:#070B14; }
      .lane { fill:none; stroke:#26364F; stroke-width:1.4; stroke-dasharray:8 7; }
      .laneLabel { fill:#7DD3FC; font-family:monospace; font-size:11px; font-weight:800; letter-spacing:1.4px; }
      .title { fill:#F8FAFC; font-family:sans-serif; font-size:34px; font-weight:800; }
      .sub { fill:#7386A2; font-family:sans-serif; font-size:14px; font-weight:600; }
      .node { fill:#101A2B; stroke:#26364F; stroke-width:1.4; }
      .blue { fill:#0B1B33; stroke:#3B82F6; stroke-width:2; }
      .green { fill:#0B241C; stroke:#22C55E; stroke-width:2; }
      .amber { fill:#241A0B; stroke:#F59E0B; stroke-width:2; }
      .red { fill:#2A1116; stroke:#EF4444; stroke-width:2; }
      .label { fill:#E2E8F0; font-family:sans-serif; font-size:16px; font-weight:800; }
      .small { fill:#94A3B8; font-family:sans-serif; font-size:12px; font-weight:600; }
      .mono { fill:#BAE6FD; font-family:monospace; font-size:11px; font-weight:800; }
      .arrow { stroke:#2DD4BF; stroke-width:2.4; fill:none; marker-end:url(#flow); }
      .muted { stroke:#334155; stroke-width:1.4; fill:none; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <rect width="1280" height="720" fill="url(#grid)" opacity="0.68"/>
  <rect x="0" y="0" width="1280" height="4" fill="#2DD4BF"/>
  <text class="title" x="56" y="58">작동 구조</text>
  <text class="sub" x="58" y="86">official login으로 profile snapshot을 만들고, switch 시 active auth file 하나만 교체합니다.</text>

  <rect class="lane" x="54" y="132" width="274" height="476" rx="18"/>
  <rect class="lane" x="366" y="132" width="460" height="476" rx="18"/>
  <rect class="lane" x="864" y="132" width="360" height="476" rx="18"/>
  <text class="laneLabel" x="78" y="160">USER SURFACE</text>
  <text class="laneLabel" x="390" y="160">APP-OWNED PROFILE STORE</text>
  <text class="laneLabel" x="888" y="160">ACTIVE CODEX RUNTIME</text>

  <rect class="blue" x="88" y="236" width="206" height="92" rx="14"/>
  <text class="label" x="116" y="272">Menu bar app</text>
  <text class="small" x="116" y="297">Add · Switch · Restart</text>

  <rect class="green" x="410" y="184" width="198" height="82" rx="14"/>
  <text class="label" x="436" y="218">Official login</text>
  <text class="small" x="436" y="242">isolated CODEX_HOME</text>

  <rect class="node" x="410" y="316" width="198" height="88" rx="14"/>
  <text class="label" x="438" y="350">ProfileStore</text>
  <text class="mono" x="438" y="375">registry.json</text>

  <rect class="node" x="638" y="316" width="150" height="88" rx="14"/>
  <text class="label" x="662" y="350">Snapshot</text>
  <text class="mono" x="662" y="375">profiles/*/auth</text>

  <rect class="green" x="410" y="470" width="378" height="92" rx="16"/>
  <text class="label" x="438" y="504">ProfileSwitchService</text>
  <text class="small" x="438" y="529">baseline · backup · replace · verify · restart</text>

  <rect class="blue" x="916" y="208" width="250" height="86" rx="15"/>
  <text class="label" x="950" y="242">~/.codex/auth.json</text>
  <text class="small" x="950" y="266">only mutable target</text>

  <rect class="amber" x="916" y="360" width="250" height="76" rx="15"/>
  <text class="label" x="982" y="392">Backup</text>
  <text class="small" x="962" y="415">restore before restart</text>

  <rect class="node" x="916" y="500" width="250" height="76" rx="15"/>
  <text class="label" x="970" y="532">Codex Desktop</text>
  <text class="small" x="958" y="555">reopened after verification</text>

  <path class="arrow" d="M294 282C344 282 354 226 407 226"/>
  <path class="arrow" d="M509 266V313"/>
  <path class="arrow" d="M608 360H635"/>
  <path class="arrow" d="M294 306C344 448 354 514 407 516"/>
  <path class="arrow" d="M788 516C850 516 850 252 913 252"/>
  <path class="arrow" d="M1041 294V357"/>
  <path class="arrow" d="M1041 436V497"/>
  <path class="muted" d="M88 438H294"/>
  <text class="small" x="96" y="426">config · sessions · history · MCP · skills stay shared</text>

  <rect class="red" x="56" y="642" width="1168" height="44" rx="12"/>
  <text class="small" x="80" y="670">차단: codex-auth, usage meter, reset credit, API key mode, auto-switch, update check, Codex config writer</text>
</svg>
